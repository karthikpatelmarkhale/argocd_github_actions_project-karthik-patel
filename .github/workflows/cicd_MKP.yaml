name: CI-CD Pipeline with ArgoCD

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions: 
 contents: write
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REGISTRY: docker.io
      IMAGE_NAME: karthikpatelmarkhale/webapp

    steps:
      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v7

      # # Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Maven
        run: |
          sudo apt install maven -y

      # Maven Build
      - name: Build with Maven
        run: mvn clean package

      # Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # DockerHub Login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.run_number }}

      # Update Deployment Manifest
      - name: Update Deployment Manifest
        run: |
          echo "Updating image tag in deployment.yml..."
          sed -i "s|${IMAGE_NAME}:.*|${IMAGE_NAME}:${GITHUB_RUN_NUMBER}|g" deploymentfiles/deployment.yml
          echo "Updated deployment.yml content:"
          cat deploymentfiles/deployment.yml

      # Commit Manifest Update
      - name: Commit and Push Deployment File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update deployment image to version ${{ github.run_number }}"
          branch: main
